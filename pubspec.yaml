name: saba_kanta
description: SABA KANTA - Weighbridge Management System for grain market
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Database
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # PDF Generation
  pdf: ^3.10.7
  printing: ^5.12.0
  
  # File handling
  path_provider: ^2.1.2
  share_plus: ^7.2.2
  
  # Bluetooth printing
  flutter_bluetooth_serial: ^0.4.0
  
  # USB OTG Printing
  usb_serial: ^0.5.2
  
  # Permissions
  permission_handler: ^11.2.0
  
  # Date formatting
  intl: ^0.18.1
  
  # UI
  flutter_spinkit: ^5.2.0
  fluttertoast: ^8.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
